<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CoreSwift CRM Admin</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0f1117;--surface:#1a1d27;--surface2:#232736;--border:#2d3248;--text:#e1e4ed;--text2:#8b8fa3;--accent:#38bdf8;--accent2:#7dd3fc;--green:#34d399;--red:#ef4444;--yellow:#fbbf24;--radius:8px}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:var(--bg);color:var(--text);min-height:100vh}
input,select,textarea{background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:10px 14px;border-radius:var(--radius);font-size:14px;width:100%}
input:focus,select:focus,textarea:focus{outline:none;border-color:var(--accent)}
button{cursor:pointer;font-size:14px;border:none;border-radius:var(--radius);padding:10px 20px;transition:all .2s}
.btn-primary{background:var(--accent);color:#fff}.btn-primary:hover{background:var(--accent2)}
.btn-secondary{background:var(--surface2);color:var(--text);border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}
.btn-sm{padding:6px 12px;font-size:12px}
table{width:100%;border-collapse:collapse}
th,td{padding:10px 12px;text-align:left;border-bottom:1px solid var(--border);font-size:13px}
th{color:var(--text2);font-weight:600;text-transform:uppercase;font-size:11px;letter-spacing:.5px}
tr:hover{background:rgba(56,189,248,.04)}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:20px;margin-bottom:16px}
.stat-card{padding:20px;text-align:center}.stat-card .num{font-size:28px;font-weight:700;color:var(--accent)}.stat-card .label{color:var(--text2);font-size:12px;text-transform:uppercase;margin-top:4px}
.grid-4{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:16px}
.modal-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.6);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:24px;width:90%;max-width:500px;max-height:80vh;overflow-y:auto}
.modal h2{margin-bottom:16px}.modal label{display:block;margin-bottom:4px;color:var(--text2);font-size:12px;margin-top:10px}.modal .actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
#app{display:flex;min-height:100vh}
.sidebar{width:240px;background:var(--surface);border-right:1px solid var(--border);padding:20px 0;flex-shrink:0}
.sidebar .logo{padding:0 20px 20px;font-size:18px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar .user-info{padding:0 20px 16px;font-size:12px;color:var(--text2);border-bottom:1px solid var(--border);margin-bottom:12px}
.sidebar nav a{display:flex;align-items:center;gap:10px;padding:10px 20px;color:var(--text2);font-size:13px;transition:all .2s;border-left:3px solid transparent}
.sidebar nav a:hover,.sidebar nav a.active{color:var(--text);background:rgba(56,189,248,.08);border-left-color:var(--accent)}
.main{flex:1;padding:24px;overflow-x:auto}
.main h1{font-size:22px;margin-bottom:20px}.main .top-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.tabs{display:flex;gap:4px;margin-bottom:20px;border-bottom:1px solid var(--border)}
.tabs button{background:none;color:var(--text2);padding:8px 16px;font-size:13px;border-bottom:2px solid transparent;border-radius:0}
.tabs button.active{color:var(--accent);border-bottom-color:var(--accent)}
.loading{text-align:center;padding:40px;color:var(--text2)}
.error{color:var(--red);padding:12px;background:rgba(239,68,68,.1);border-radius:var(--radius);margin-bottom:12px}
.success{color:var(--green);padding:12px;background:rgba(52,211,153,.1);border-radius:var(--radius);margin-bottom:12px}
.empty{text-align:center;padding:40px;color:var(--text2);font-size:14px}
#login-page{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.login-box{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:40px;width:100%;max-width:400px}
.login-box h1{text-align:center;margin-bottom:8px;color:var(--accent);font-size:24px}
.login-box p{text-align:center;color:var(--text2);margin-bottom:24px;font-size:13px}
.login-box label{display:block;font-size:12px;color:var(--text2);margin-bottom:4px;margin-top:14px}
.login-box button{width:100%;margin-top:20px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-active{background:rgba(52,211,153,.15);color:var(--green)}
.badge-inactive{background:rgba(239,68,68,.15);color:var(--red)}
.badge-pending{background:rgba(251,191,36,.15);color:var(--yellow)}
.pagination{display:flex;gap:8px;justify-content:center;align-items:center;padding:16px 0;font-size:13px}
.pagination button{background:var(--surface2);color:var(--text);padding:6px 12px;border:1px solid var(--border)}
.pagination button:disabled{opacity:.4;cursor:default}
@media(max-width:768px){.sidebar{width:60px;overflow:hidden}.sidebar .logo{font-size:14px;padding:12px 16px}.sidebar nav a{padding:10px 16px;justify-content:center}.sidebar nav a span{display:none}.sidebar .user-info{display:none}.main{padding:16px}}
</style>
</head>
<body>
<div id="login-page" style="display:none">
<div class="login-box">
<h1>📇 CoreSwift CRM</h1>
<p>Customer Relationship Management</p>
<div id="login-error" class="error" style="display:none"></div>
<label>Email</label>
<input type="email" id="login-email" value="admin@swiftsoftware.com">
<label>Password</label>
<input type="password" id="login-password" value="SwiftAdmin2026!">
<button class="btn-primary" onclick="login()">Sign In</button>
</div>
</div>
<div id="app" style="display:none">
<div class="sidebar">
<div class="logo">📇 CoreCRM</div>
<div class="user-info" id="user-info">admin@swiftsoftware.com<br>Admin</div>
<nav>
<a href="#" onclick="showPage('dashboard')" data-page="dashboard" class="active"><span>📊</span><span>Dashboard</span></a>
<a href="#" onclick="showPage('contacts')" data-page="contacts"><span>👥</span><span>Contacts</span></a>
<a href="#" onclick="showPage('companies')" data-page="companies"><span>🏢</span><span>Companies</span></a>
<a href="#" onclick="showPage('pipelines')" data-page="pipelines"><span>📋</span><span>Pipelines</span></a>
<a href="#" onclick="showPage('deals')" data-page="deals"><span>💰</span><span>Deals</span></a>
<a href="#" onclick="showPage('activities')" data-page="activities"><span>📅</span><span>Activities</span></a>
<a href="#" onclick="showPage('portfolio')" data-page="portfolio"><span>📁</span><span>Portfolio</span></a>
<a href="#" onclick="showPage('campaigns')" data-page="campaigns"><span>📢</span><span>Campaigns</span></a>
<a href="#" onclick="logout()" style="margin-top:20px;border-top:1px solid var(--border);padding-top:16px"><span>🚪</span><span>Logout</span></a>
</nav>
</div>
<div class="main" id="main-content"></div>
</div>
<script>
const API = window.location.origin + '/api';
let token = localStorage.getItem('crm_token');
let currentUser = null;

function $(id){return document.getElementById(id)}
function show(el){el.style.display=''}
function hide(el){el.style.display='none'}

async function api(path, opts={}){
  const headers={'Content-Type':'application/json'};
  if(token) headers['Authorization']='Bearer '+token;
  const res=await fetch(API+path,{...opts,headers});
  if(res.status===401 && token){token=null;localStorage.removeItem('crm_token');render()}
  const data=await res.json();
  if(!res.ok) throw new Error(data.message||data.error||'Request failed');
  return data;
}

async function login(){
  const email=$('login-email').value;
  const password=$('login-password').value;
  hide($('login-error'));
  try{
    const res=await api('/auth/login',{method:'POST',body:JSON.stringify({email,password})});
    token=res.access_token||res.token;
    currentUser=res.user;
    localStorage.setItem('crm_token',token);
    render();
  }catch(e){
    $('login-error').textContent=e.message;
    show($('login-error'));
  }
}

function logout(){
  token=null;currentUser=null;
  localStorage.removeItem('crm_token');
  render();
}

async function loadUser(){
  try{
    const res=await api('/auth/me');
    currentUser=res;
    $('user-info').innerHTML=currentUser.email+'<br>'+(currentUser.role||'User');
  }catch(e){}
}

function render(){
  if(token){
    hide($('login-page'));
    show($('app'));
    loadUser();
    showPage('dashboard');
  }else{
    show($('login-page'));
    hide($('app'));
  }
}

let currentPage='';

async function showPage(page){
  currentPage=page;
  document.querySelectorAll('.sidebar nav a').forEach(a=>a.classList.toggle('active',a.dataset.page===page));
  const mc=$('main-content');
  mc.innerHTML='<div class="loading">Loading...</div>';
  const renderers={
    dashboard:renderDashboard,
    contacts:renderContacts,
    companies:renderCompanies,
    pipelines:renderPipelines,
    deals:renderDeals,
    activities:renderActivities,
    portfolio:renderPortfolio,
    campaigns:renderCCampaigns,
  };
  try{
    await renderers[page]();
  }catch(e){
    mc.innerHTML='<div class="error">Failed to load: '+e.message+'</div>';
  }
}

/* ===== DASHBOARD ===== */
async function renderDashboard(){
  let stats;
  try{stats=await api('/dashboard')}catch(e){stats=null}
  let contacts,companies,deals;
  try{contacts=await api('/contacts')}catch(e){contacts=[]}
  try{companies=await api('/companies')}catch(e){companies=[]}
  try{deals=await api('/pipelines/deals')}catch(e){deals=[]}
  if(!Array.isArray(contacts))contacts=contacts?.data||[];
  if(!Array.isArray(companies))companies=companies?.data||[];
  if(!Array.isArray(deals))deals=deals?.data||[];
  const won=deals.filter(d=>d.stage==='won'||d.status==='won').length;
  const mc=$('main-content');
  mc.innerHTML='<h1>📊 Dashboard</h1>'
    +'<div class="grid-4">'
    +  '<div class="card stat-card"><div class="num">'+(stats?.contacts||contacts.length||'—')+'</div><div class="label">Contacts</div></div>'
    +  '<div class="card stat-card"><div class="num">'+(stats?.companies||companies.length||'—')+'</div><div class="label">Companies</div></div>'
    +  '<div class="card stat-card"><div class="num">'+(stats?.deals||deals.length||'—')+'</div><div class="label">Deals</div></div>'
    +  '<div class="card stat-card"><div class="num">'+(won||'—')+'</div><div class="label">Won</div></div>'
    +'</div>'
    +'<div class="card"><h3 style="margin-bottom:12px">Recent Activity</h3>'
    +  '<div class="empty">Activity feed will display here</div>'
    +'</div>';
}

/* ===== CONTACTS ===== */
let contacts=[],conPage=1,conSearch='';
async function renderContacts(){
  try{contacts=await api('/contacts')}catch(e){contacts=[]}
  if(!Array.isArray(contacts))contacts=contacts?.data||contacts?.contacts||[];
  renderContactsTable();
}
function renderContactsTable(){
  const start=(conPage-1)*20;
  const filtered=contacts.filter(c=>!conSearch||(c.name||c.email||c.phone||'').toLowerCase().includes(conSearch.toLowerCase()));
  const page=filtered.slice(start,start+20);
  const tp=Math.ceil(filtered.length/20)||1;
  const mc=$('main-content');
  mc.innerHTML='<div class="top-bar"><h1>👥 Contacts</h1><button class="btn-primary" onclick="showContactForm()">+ Add Contact</button></div>'
    +'<div style="margin-bottom:12px"><input placeholder="Search contacts..." oninput="conSearch=this.value;conPage=1;renderContactsTable()" style="max-width:300px"></div>'
    +'<div class="card" style="padding:0;overflow-x:auto"><table>'
    +'<tr><th>Name</th><th>Email</th><th>Phone</th><th>Company</th><th>Status</th><th>Actions</th></tr>'
    +page.map(c=>'<tr><td>'+esc(c.name||'—')+'</td><td>'+esc(c.email||'—')+'</td><td>'+esc(c.phone||'—')+'</td><td>'+esc(c.company_name||c.company?.name||'—')+'</td><td><span class="badge badge-'+(c.status==='active'||!c.status?'active':'inactive')+'">'+esc(c.status||'active')+'</span></td><td><button class="btn-secondary btn-sm" onclick="editContact(\''+(c.id||'')+'\')">Edit</button></td></tr>').join('')
    +'</table></div>'
    +'<div class="pagination"><button onclick="conPage=Math.max(1,conPage-1);renderContactsTable()" '+(conPage<=1?'disabled':'')+'>← Prev</button><span>Page '+conPage+' of '+tp+'</span><button onclick="conPage=Math.min(tp,conPage+1);renderContactsTable()" '+(conPage>=tp?'disabled':'')+'>Next →</button></div>';
}
function showContactForm(c){showModal('Contact',c||{});}
function editContact(id){
  const c=contacts.find(x=>x.id===id);
  if(c)showContactForm(c);
}

/* ===== COMPANIES ===== */
let companies=[],compPage=1,compSearch='';
async function renderCompanies(){
  try{companies=await api('/companies')}catch(e){companies=[]}
  if(!Array.isArray(companies))companies=companies?.data||[];
  renderCompaniesTable();
}
function renderCompaniesTable(){
  const start=(compPage-1)*20;
  const filtered=companies.filter(c=>!compSearch||(c.name||c.domain||'').toLowerCase().includes(compSearch.toLowerCase()));
  const page=filtered.slice(start,start+20);
  const tp=Math.ceil(filtered.length/20)||1;
  const mc=$('main-content');
  mc.innerHTML='<div class="top-bar"><h1>🏢 Companies</h1><button class="btn-primary" onclick="showCompanyForm()">+ Add Company</button></div>'
    +'<div style="margin-bottom:12px"><input placeholder="Search companies..." oninput="compSearch=this.value;compPage=1;renderCompaniesTable()" style="max-width:300px"></div>'
    +'<div class="card" style="padding:0;overflow-x:auto"><table>'
    +'<tr><th>Name</th><th>Domain</th><th>Industry</th><th>Contacts</th><th>Actions</th></tr>'
    +page.map(c=>'<tr><td>'+esc(c.name||'—')+'</td><td>'+esc(c.domain||'—')+'</td><td>'+esc(c.industry||'—')+'</td><td>'+(c.contact_count||0)+'</td><td><button class="btn-secondary btn-sm" onclick="editCompany(\''+(c.id||'')+'\')">Edit</button></td></tr>').join('')
    +'</table></div>'
    +'<div class="pagination"><button onclick="compPage=Math.max(1,compPage-1);renderCompaniesTable()" '+(compPage<=1?'disabled':'')+'>← Prev</button><span>Page '+compPage+' of '+tp+'</span><button onclick="compPage=Math.min(tp,compPage+1);renderCompaniesTable()" '+(compPage>=tp?'disabled':'')+'>Next →</button></div>';
}
function showCompanyForm(c){showModal('Company',c||{});}
function editCompany(id){
  const c=companies.find(x=>x.id===id);
  if(c)showCompanyForm(c);
}

/* ===== PIPELINES ===== */
let pipelines=[],pipPage=1;
async function renderPipelines(){
  try{pipelines=await api('/pipelines')}catch(e){pipelines=[]}
  if(!Array.isArray(pipelines))pipelines=pipelines?.data||[];
  renderPipelinesTable();
}
function renderPipelinesTable(){
  const start=(pipPage-1)*20;
  const page=pipelines.slice(start,start+20);
  const tp=Math.ceil(pipelines.length/20)||1;
  const mc=$('main-content');
  mc.innerHTML='<div class="top-bar"><h1>📋 Pipelines</h1><button class="btn-primary" onclick="showPipelineForm()">+ New Pipeline</button></div>'
    +'<div class="card" style="padding:0;overflow-x:auto"><table>'
    +'<tr><th>Name</th><th>Stages</th><th>Deals</th><th>Actions</th></tr>'
    +page.map(p=>'<tr><td>'+esc(p.name||'—')+'</td><td>'+(Array.isArray(p.stages)?p.stages.length:0)+'</td><td>'+(p.deal_count||0)+'</td><td><button class="btn-secondary btn-sm" onclick="editPipeline(\''+(p.id||'')+'\')">Edit</button></td></tr>').join('')
    +'</table></div>'
    +'<div class="pagination"><button onclick="pipPage=Math.max(1,pipPage-1);renderPipelinesTable()" '+(pipPage<=1?'disabled':'')+'>← Prev</button><span>Page '+pipPage+' of '+tp+'</span><button onclick="pipPage=Math.min(tp,pipPage+1);renderPipelinesTable()" '+(pipPage>=tp?'disabled':'')+'>Next →</button></div>';
}
function showPipelineForm(p){showModal('Pipeline',p||{});}
function editPipeline(id){
  const p=pipelines.find(x=>x.id===id);
  if(p)showPipelineForm(p);
}

/* ===== DEALS ===== */
let deals=[],dealPage=1,dealSearch='';
async function renderDeals(){
  try{deals=await api('/pipelines/deals')}catch(e){deals=[]}
  if(!Array.isArray(deals))deals=deals?.data||[];
  renderDealsTable();
}
function renderDealsTable(){
  const start=(dealPage-1)*20;
  const filtered=deals.filter(d=>!dealSearch||(d.name||d.title||d.contact_name||'').toLowerCase().includes(dealSearch.toLowerCase()));
  const page=filtered.slice(start,start+20);
  const tp=Math.ceil(filtered.length/20)||1;
  const mc=$('main-content');
  mc.innerHTML='<div class="top-bar"><h1>💰 Deals</h1><button class="btn-primary" onclick="showDealForm()">+ New Deal</button></div>'
    +'<div style="margin-bottom:12px"><input placeholder="Search deals..." oninput="dealSearch=this.value;dealPage=1;renderDealsTable()" style="max-width:300px"></div>'
    +'<div class="card" style="padding:0;overflow-x:auto"><table>'
    +'<tr><th>Name</th><th>Contact</th><th>Value</th><th>Stage</th><th>Actions</th></tr>'
    +page.map(d=>'<tr><td>'+esc(d.name||d.title||'—')+'</td><td>'+esc(d.contact_name||d.contact?.name||'—')+'</td><td>'+(d.value?'$'+Number(d.value).toLocaleString():'—')+'</td><td><span class="badge badge-'+(d.stage==='won'?'active':d.stage==='lost'?'inactive':'pending')+'">'+esc(d.stage||'open')+'</span></td><td><button class="btn-secondary btn-sm" onclick="editDeal(\''+(d.id||'')+'\')">Edit</button></td></tr>').join('')
    +'</table></div>'
    +'<div class="pagination"><button onclick="dealPage=Math.max(1,dealPage-1);renderDealsTable()" '+(dealPage<=1?'disabled':'')+'>← Prev</button><span>Page '+dealPage+' of '+tp+'</span><button onclick="dealPage=Math.min(tp,dealPage+1);renderDealsTable()" '+(dealPage>=tp?'disabled':'')+'>Next →</button></div>';
}
function showDealForm(d){showModal('Deal',d||{});}
function editDeal(id){
  const d=deals.find(x=>x.id===id);
  if(d)showDealForm(d);
}

/* ===== ACTIVITIES ===== */
async function renderActivities(){
  let activities;
  try{activities=await api('/activities')}catch(e){activities=[]}
  if(!Array.isArray(activities))activities=activities?.data||[];
  try{activities=await api('/events')}catch(e){}
  if(!Array.isArray(activities))activities=activities?.data||[];
  const mc=$('main-content');
  mc.innerHTML='<h1>📅 Activities & Events</h1>'
    +'<div class="card" style="padding:0;overflow-x:auto"><table>'
    +'<tr><th>Type</th><th>Description</th><th>Related To</th><th>Date</th></tr>'
    +(activities.length?activities.slice(0,50).map(a=>'<tr><td>'+esc(a.type||a.event_type||'—')+'</td><td>'+esc(a.description||a.notes||'—')+'</td><td>'+esc(a.contact_name||a.entity_type||'—')+'</td><td>'+(a.created_at?new Date(a.created_at).toLocaleDateString():'—')+'</td></tr>').join(''):'<tr><td colspan="4" class="empty">No activities recorded</td></tr>')
    +'</table></div>';
}

/* ===== PORTFOLIO ===== */
async function renderPortfolio(){
  let portfolio;
  try{portfolio=await api('/portfolio')}catch(e){portfolio=[]}
  if(!Array.isArray(portfolio))portfolio=portfolio?.data||portfolio?.companies||[];
  const mc=$('main-content');
  mc.innerHTML='<h1>📁 Portfolio</h1>'
    +'<div class="card" style="padding:0;overflow-x:auto"><table>'
    +'<tr><th>Company</th><th>Investment</th><th>Status</th><th>Actions</th></tr>'
    +(portfolio.length?portfolio.slice(0,50).map(p=>'<tr><td>'+esc(p.name||p.company_name||'—')+'</td><td>'+(p.investment?'$'+Number(p.investment).toLocaleString():'—')+'</td><td><span class="badge badge-'+(p.status==='active'?'active':'inactive')+'">'+esc(p.status||'active')+'</span></td><td><button class="btn-secondary btn-sm" onclick="editPortfolio(\''+(p.id||'')+'\')">Edit</button></td></tr>').join(''):'<tr><td colspan="4" class="empty">No portfolio companies</td></tr>')
    +'</table></div>';
}
function editPortfolio(id){
  showToast('Edit portfolio company #'+id.slice(0,8));
}

/* ===== CAMPAIGNS ===== */
async function renderCCampaigns(){
  let campaigns;
  try{campaigns=await api('/campaigns')}catch(e){campaigns=[]}
  if(!Array.isArray(campaigns))campaigns=campaigns?.data||[];
  const mc=$('main-content');
  mc.innerHTML='<h1>📢 Campaigns</h1>'
    +'<div class="card" style="padding:0;overflow-x:auto"><table>'
    +'<tr><th>Name</th><th>Type</th><th>Status</th><th>Sent</th><th>Actions</th></tr>'
    +(campaigns.length?campaigns.slice(0,50).map(c=>'<tr><td>'+esc(c.name||'—')+'</td><td>'+esc(c.type||'—')+'</td><td><span class="badge badge-'+(c.status==='active'||c.status==='sent'?'active':'inactive')+'">'+esc(c.status||'draft')+'</span></td><td>'+(c.sent_count||0)+'</td><td><button class="btn-secondary btn-sm" onclick="editCCampaign(\''+(c.id||'')+'\')">Edit</button></td></tr>').join(''):'<tr><td colspan="5" class="empty">No campaigns</td></tr>')
    +'</table></div>';
}
function editCCampaign(id){
  showToast('Edit campaign #'+id.slice(0,8));
}

/* ===== MODAL ===== */
function showModal(title,data){
  const overlay=document.createElement('div');
  overlay.className='modal-overlay';
  overlay.onclick=e=>{if(e.target===overlay)overlay.remove()};
  const fields=Object.keys(data).filter(k=>!['id','created_at','updated_at','password_hash'].includes(k));
  overlay.innerHTML='<div class="modal"><h2>'+esc(title)+'</h2><form id="modal-form">'
    +(fields.length?fields.map(k=>'<label>'+esc(k.charAt(0).toUpperCase()+k.slice(1))+'</label><input name="'+k+'" value="'+(data[k]||'')+'">').join('')
      :'<label>Name</label><input name="name"><label>Email</label><input name="email" type="email">')
    +'</form><div class="actions"><button class="btn-secondary" onclick="this.closest(\'.modal-overlay\').remove()">Cancel</button>'
    +'<button class="btn-primary" onclick="saveModal(this)">Save</button></div></div>';
  document.body.appendChild(overlay);
}
async function saveModal(btn){
  const form=btn.closest('.modal').querySelector('#modal-form');
  const data=Object.fromEntries(new FormData(form));
  btn.textContent='Saving...';btn.disabled=true;
  setTimeout(()=>{btn.closest('.modal-overlay')?.remove();showToast('Saved (mock)');},500);
}

/* ===== UTILITIES ===== */
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function showToast(msg,type){
  const el=document.createElement('div');
  el.className=type==='error'?'error':'success';
  el.textContent=msg;
  el.style.position='fixed';el.style.top='16px';el.style.right='16px';el.style.zIndex='200';el.style.maxWidth='400px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),3000);
}

render();
</script>
